# Production-friendly Streamlit defaults. These also apply locally when
# you run `streamlit run app.py`. Override anything you want.

[theme]
primaryColor = "#2563eb"          # blue used for selected cards / primary buttons
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f5f9"
textColor = "#111827"
font = "sans serif"

[server]
headless = true
runOnSave = false
fileWatcherType = "auto"
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
